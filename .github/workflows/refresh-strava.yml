name: Refresh Strava Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

concurrency:
  group: refresh-strava-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Run Strava fetcher
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          nix run . > strava-stats.json 2> strava-fetcher.stderr
          if grep -q '<html' strava-stats.json; then
            echo "CLI emitted HTML instead of JSON" >&2
            exit 1
          fi
          jq empty strava-stats.json

      - name: Preserve rotated refresh token
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          latest_token="$(sed -n 's/^Latest STRAVA_REFRESH_TOKEN=//p' strava-fetcher.stderr | tail -n 1)"
          if [ -z "${latest_token}" ]; then
            echo "Failed to extract rotated refresh token from stderr" >&2
            echo "CLI stderr was:" >&2
            cat strava-fetcher.stderr >&2
            exit 1
          fi
          if [ "${latest_token}" != "${{ secrets.STRAVA_REFRESH_TOKEN }}" ]; then
            gh secret set STRAVA_REFRESH_TOKEN --repo "${GITHUB_REPOSITORY}" --body "${latest_token}"
          fi

      - name: Publish snapshot to snapshot branch
        env:
          SNAPSHOT_BRANCH: ${{ vars.SNAPSHOT_BRANCH || 'strava-snapshots' }}
        run: |
          set -euo pipefail
          cp strava-stats.json /tmp/strava-stats.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "${SNAPSHOT_BRANCH}" >/dev/null 2>&1; then
            git switch --track -C "${SNAPSHOT_BRANCH}" "origin/${SNAPSHOT_BRANCH}"
          else
            git switch --orphan "${SNAPSHOT_BRANCH}"
          fi
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name strava-stats.json -exec rm -rf {} +
          cp /tmp/strava-stats.json ./strava-stats.json
          git add -A
          if git diff --cached --quiet; then
            echo "No JSON changes detected; skipping commit"
            exit 0
          fi
          git commit -m "Update Strava stats snapshot"
          git push origin "HEAD:${SNAPSHOT_BRANCH}"
