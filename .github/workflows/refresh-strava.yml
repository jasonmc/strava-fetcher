name: Refresh Strava Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

concurrency:
  group: refresh-strava-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run Strava fetcher
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          nix run . > strava-stats.json 2> strava-fetcher.stderr
          if grep -q '<html' strava-stats.json; then
            echo "CLI emitted HTML instead of JSON" >&2
            exit 1
          fi
          jq empty strava-stats.json

      - name: Preserve rotated refresh token
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_token="$(sed -n 's/^Latest STRAVA_REFRESH_TOKEN=//p' strava-fetcher.stderr | tail -n 1)"
          if [ -z "${latest_token}" ]; then
            echo "Failed to extract rotated refresh token from stderr" >&2
            echo "CLI stderr was:" >&2
            cat strava-fetcher.stderr >&2
            exit 1
          fi
          if [ "${latest_token}" != "${{ secrets.STRAVA_REFRESH_TOKEN }}" ]; then
            gh secret set STRAVA_REFRESH_TOKEN --repo "${GITHUB_REPOSITORY}" --body "${latest_token}"
          fi

      - name: Publish snapshot to snapshot branch
        env:
          SNAPSHOT_BRANCH: ${{ vars.SNAPSHOT_BRANCH }}
        run: |
          set -euo pipefail
          SNAPSHOT_BRANCH="${SNAPSHOT_BRANCH:-strava-snapshots}"
          snapshot_dir="$(mktemp -d /tmp/strava-snapshot-worktree.XXXXXX)"
          cleanup() {
            git worktree remove --force "${snapshot_dir}" || true
          }
          trap cleanup EXIT
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "${SNAPSHOT_BRANCH}" >/dev/null 2>&1; then
            git worktree add "${snapshot_dir}" --detach "origin/${SNAPSHOT_BRANCH}"
            git -C "${snapshot_dir}" switch -C "${SNAPSHOT_BRANCH}" --track "origin/${SNAPSHOT_BRANCH}"
          else
            git worktree add "${snapshot_dir}" --detach HEAD
            git -C "${snapshot_dir}" switch --orphan "${SNAPSHOT_BRANCH}"
          fi
          find "${snapshot_dir}" -mindepth 1 -maxdepth 1 ! -name .git ! -name strava-stats.json -exec rm -rf {} +
          cp strava-stats.json "${snapshot_dir}/strava-stats.json"
          git -C "${snapshot_dir}" add -A
          if git -C "${snapshot_dir}" diff --cached --quiet; then
            echo "No JSON changes detected; skipping commit"
            exit 0
          fi
          git -C "${snapshot_dir}" commit -m "Update Strava stats snapshot"
          git -C "${snapshot_dir}" push origin "HEAD:${SNAPSHOT_BRANCH}"
